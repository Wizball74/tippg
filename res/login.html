<h2>Anmelden</h2>
<div id="login_response"></div>
<form id="loginForm" method="post">
    <fieldset>
        <legend></legend>
        <p>
            <label for="loginUsername">Benutzername</label>
            <input id="loginUsername" name="loginUsername" type="text" class="text" placeholder="Benutzername" required />
        </p>

        <p>
            <label for="loginPassword">Kennwort</label>
            <input id="loginPassword" name="loginPassword" class="text" type="password" placeholder="Kennwort" required />
        </p>
        
        <p>
            <label for="remember">automatisch anmelden</label>
            <input id="remember" name="remember" class="" type="checkbox" />
        </p>
        
        <p><button id="bLogin" class="button" type="submit">Anmelden</button></p>
        <div id="login_loading"><img src="css/images/spinner.gif" alt=""/>&nbsp;Bitte warten... </div>
    </fieldset>
</form>
