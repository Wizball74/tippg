    <script type="text/javascript">
    (function() {
        var cssBase = document.getElementById('cssBase');
        var cssTheme = document.getElementById('cssTheme');

        var themes = {
            classic: { base: 'css/style-classic.css', theme: 'css/kt-classic.css' },
            modern:  { base: 'css/style-modern.css',  theme: 'css/kt-modern.css' },
            premium: { base: 'css/style-premium.css', theme: 'css/style-premium.css' }
        };

        function applyTheme(name) {
            var t = themes[name] || themes.classic;
            cssBase.href = t.base;
            cssTheme.href = t.theme;
        }

        // Gespeicherte Einstellung laden (Standard: klassisch)
        var currentTheme = localStorage.getItem('kt_theme') || 'classic';
        if (!themes[currentTheme]) currentTheme = 'classic';
        applyTheme(currentTheme);

        // Theme-Wechsel als globale Funktion
        window.ktSetTheme = function(name) {
            if (themes[name]) {
                currentTheme = name;
                localStorage.setItem('kt_theme', name);
                applyTheme(name);
            }
        };

        jQuery(document).ready(function () {

            kt.init();
        });
    })();
    </script>
