    <script src="js/kt.funcs.js"></script>

    <script type="text/javascript">
    (function() {
        var cssBase = document.getElementById('cssBase');
        var cssTheme = document.getElementById('cssTheme');

        function applyTheme(modern) {
            if (modern) {
                cssBase.href = 'css/style-modern.css';
                cssTheme.href = 'css/kt-modern.css';
            } else {
                cssBase.href = 'css/style-classic.css';
                cssTheme.href = 'css/kt-classic.css';
            }
        }

        // Gespeicherte Einstellung laden (Standard: klassisch)
        var saved = localStorage.getItem('kt_theme');
        var isModern = (saved === 'modern');
        applyTheme(isModern);

        jQuery(document).ready(function () {
            var sw = document.getElementById('themeSwitch');
            var track = document.getElementById('themeSwitchTrack');
            var knob = document.getElementById('themeSwitchKnob');
            var label = document.getElementById('themeLabel');

            function updateToggle(modern) {
                sw.checked = modern;
                track.style.background = modern ? '#2c5f2d' : '#ccc';
                knob.style.left = modern ? '18px' : '2px';
                label.textContent = modern ? 'Modern' : 'Klassisch';
            }

            updateToggle(isModern);

            sw.addEventListener('change', function() {
                isModern = sw.checked;
                localStorage.setItem('kt_theme', isModern ? 'modern' : 'classic');
                applyTheme(isModern);
                updateToggle(isModern);
            });

            // Label/Track klickbar machen
            track.parentElement.addEventListener('click', function(e) {
                if (e.target !== sw) {
                    sw.checked = !sw.checked;
                    sw.dispatchEvent(new Event('change'));
                }
            });

            kt.init();
        });
    })();
    </script>
